<app-chat-shell [empty]="messages().length === 0">
  <div chatHero>
    <app-init-chat-hero />
  </div>

  <div chatComposer>
    <app-text-message-box
      placeholder="¿Cómo puedo ayudarte?"
      [disabledCorrections]="true"
      (onMessage)="handleMessage($event)"
    ></app-text-message-box>
  </div>

  <div chatTrail>
    <app-init-chat-suggestions />
  </div>

  <div chatThread class="w-full">
    <div class="grid gap-y-2 w-4xl mx-auto">
      @for (message of messages(); track $index) {
        @if (message.isGpt) {
          <app-chat-message [text]="message.text" />
        } @else {
          <app-my-message [text]="message.text"></app-my-message>
        }
      }
    </div>
  </div>

  @if (isLoading()) {
    <ng-container chatAux>
      <app-typing-loader />
    </ng-container>
  }
</app-chat-shell>

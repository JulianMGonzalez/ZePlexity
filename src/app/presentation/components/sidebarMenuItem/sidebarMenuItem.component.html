<a
  [routerLink]="path"
  routerLinkActive="!bg-indigo-500/20"
  [routerLinkActiveOptions]="{ exact: true }"
  [attr.title]="collapsed ? title : null"
  class="group flex cursor-pointer items-center gap-3 rounded-lg text-gray-500 dark:text-gray-300"
  [ngClass]="collapsed ? 'justify-center p-3' : 'px-3 py-2.5'"
>
  @if (icon) {
    <i [class]="icon" class="w-5 shrink-0 text-center text-gray-600"></i>
  }
  @if (!collapsed) {
    <div class="flex min-w-0 flex-col">
      <span class="text-sm font-semibold whitespace-nowrap">{{ title }}</span>
    </div>
  }
</a>

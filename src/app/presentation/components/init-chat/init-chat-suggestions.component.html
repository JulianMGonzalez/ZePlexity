<section class="pt-4" aria-label="Ejemplos para empezar">
  <h2 class="pb-2 text-gray-500 dark:text-gray-300 tracking-tight">Get started with these examples</h2>
  <ul class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch">
    @for (suggestion of suggestions; track $index) {
      <li class="list-none py-1 flex h-full min-h-0 bg-gray-50 dark:bg-gray-700 rounded-lg shadow-sm">
        <a
          href="#"
          class="flex flex-1 items-center gap-2 px-3 py-1 w-full min-h-0 rounded-lg"
        >
          <i [class]="suggestion.icon" class="text-md text-gray-500 dark:text-gray-400 shrink-0 mr-2"></i>
          <span class="text-[12px] text-gray-600 dark:text-gray-400 leading-tight">
            {{ suggestion.title }}
          </span>
        </a>
      </li>
    }
  </ul>
</section>

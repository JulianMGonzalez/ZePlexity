<main class="flex flex-row">
  <nav
    class="hidden min-h-[calc(100vh)] flex-col overflow-hidden border-r-1 border-l-0 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 transition-[width] duration-300 ease-in-out sm:flex"
    [ngClass]="collapsed() ? 'w-[72px]' : 'w-[280px]'"
  >
    <!-- Header -->
    <div
      class="flex h-[72px] shrink-0 items-center gap-2 px-3 py-5"
      [ngClass]="collapsed() ? 'justify-center' : 'justify-between px-4'"
    >
      @if (!collapsed()) {
        <h1
          class="m-0 bg-gradient-to-br from-gray-900 via-gray-900/50 bg-clip-text text-2xl font-bold whitespace-nowrap text-transparent dark:from-white dark:via-white/50"
        >
          ZePlexity<span class="text-indigo-500">.</span>
        </h1>
      }
      <button
        type="button"
        (click)="toggleSidebar()"
        class="flex h-9 w-9 shrink-0 cursor-pointer items-center justify-center rounded-lg text-gray-400 transition-colors hover:bg-white/10 hover:text-white"
        [attr.aria-label]="collapsed() ? 'Expandir menú' : 'Colapsar menú'"
        [attr.title]="collapsed() ? 'Expandir' : 'Colapsar'"
      >
        <i
          class="fa-solid text-gray-600 dark:text-gray-300"
          [class.fa-chevron-right]="collapsed()"
          [class.fa-chevron-left]="!collapsed()"
        ></i>
      </button>
    </div>

    <!-- Nav Links -->
    <div class="flex flex-1 flex-col gap-1 overflow-y-auto px-2 py-2">
      @for (route of menuItems; track route.path) {
        @if (route.path) {
          <app-sidebar-menu-item
            [path]="route.path"
            [title]="route.data!['title']"
            [icon]="route.data!['icon']"
            [collapsed]="collapsed()"
          ></app-sidebar-menu-item>
        }
      }
    </div>
    <!-- End Nav Links -->

    <!-- Footer -->
    <div
      class="mt-auto flex shrink-0 flex-col gap-1 border-t border-gray-200 px-2 py-3 dark:border-gray-700/50"
    >
      <button
        type="button"
        class="group flex cursor-pointer items-center gap-3 rounded-lg text-gray-600 transition-colors hover:bg-black/5 hover:text-gray-900 dark:text-gray-300 dark:hover:bg-white/10 dark:hover:text-white"
        [ngClass]="collapsed() ? 'justify-center p-3' : 'px-3 py-2.5'"
        [attr.title]="collapsed() ? 'Ajustes' : null"
        aria-label="Ajustes"
      >
        <i class="fa-solid fa-gear w-5 shrink-0 text-center text-base"></i>
        @if (!collapsed()) {
          <span class="text-sm font-semibold whitespace-nowrap">Ajustes</span>
        }
      </button>

      <button
        type="button"
        class="group flex cursor-pointer items-center gap-3 rounded-lg text-gray-700 transition-colors hover:bg-black/5 dark:text-gray-200 dark:hover:bg-white/10"
        [ngClass]="collapsed() ? 'justify-center p-2' : 'px-2 py-2'"
        [attr.title]="collapsed() ? 'Mi perfil' : null"
        aria-label="Mi perfil"
      >
        <div
          class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 text-sm font-semibold text-white"
        >
          ZP
        </div>
        @if (!collapsed()) {
          <div class="flex min-w-0 flex-col text-left">
            <span class="text-sm font-semibold whitespace-nowrap">Mi perfil</span>
            <small class="truncate text-xs text-gray-500">Configurar cuenta</small>
          </div>
        }
      </button>
    </div>
    <!-- End Footer -->
  </nav>

  <section class="flex h-[calc(100vh)] w-full flex-col bg-white/10">
    <div class="flex h-full flex-row">
      <div class="flex flex-auto flex-col">
        <router-outlet />
      </div>
    </div>
  </section>
</main>

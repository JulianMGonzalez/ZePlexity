<main class="flex flex-row">
  <nav
    class="hidden min-h-[calc(100vh)] flex-col overflow-hidden border-r-1 border-l-0 border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 transition-[width] duration-300 ease-in-out sm:flex"
    [ngClass]="collapsed() ? 'w-[72px]' : 'w-[280px]'"
  >
    <!-- Header -->
    <div
      class="flex h-[72px] shrink-0 items-center gap-2 px-3 py-5"
      [ngClass]="collapsed() ? 'justify-center' : 'justify-between px-4'"
    >
      @if (!collapsed()) {
        <h1
          class="m-0 bg-gradient-to-br from-gray-900 via-gray-900/50 bg-clip-text text-2xl font-bold whitespace-nowrap text-transparent dark:from-white dark:via-white/50"
        >
          ZePlexity<span class="text-indigo-500">.</span>
        </h1>
      }
      <button
        type="button"
        (click)="toggleSidebar()"
        class="flex h-9 w-9 shrink-0 cursor-pointer items-center justify-center rounded-lg text-gray-400 transition-colors hover:bg-white/10 hover:text-white"
        [attr.aria-label]="collapsed() ? 'Expandir menú' : 'Colapsar menú'"
        [attr.title]="collapsed() ? 'Expandir' : 'Colapsar'"
      >
        <i
          class="fa-solid"
          [class.fa-chevron-right]="collapsed()"
          [class.fa-chevron-left]="!collapsed()"
        ></i>
      </button>
    </div>

    <!-- Nav Links -->
    <div class="flex flex-col gap-1 px-2 py-2">
      @for (route of menuItems; track route.path) {
        @if (route.path) {
          <app-sidebar-menu-item
            [path]="route.path"
            [title]="route.data!['title']"
            [icon]="route.data!['icon']"
            [collapsed]="collapsed()"
          ></app-sidebar-menu-item>
        }
      }
    </div>
    <!-- End Nav Links -->
  </nav>

  <section class="flex h-[calc(100vh)] w-full flex-col bg-white/10">
    <div class="flex h-full flex-row">
      <div class="flex flex-auto flex-col">
        <router-outlet />
      </div>
    </div>
  </section>
</main>
